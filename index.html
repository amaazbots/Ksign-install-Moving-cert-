<style>

*{
margin:0;
padding:0;
box-sizing:border-box;

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(-45deg,#0d1b2a,#1b263b,#1e3a8a,#2563eb);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.blur{
position:absolute;
width:450px;
height:450px;
border-radius:50%;

filter:blur(150px);

}

.blur2{

right:-100px;
bottom:-100px;
width:350px;
height:350px;
background:#60a5fa;
filter:blur(130px);
border-radius:50%;
opacity:.25;
animation:float2 9s ease-in-out infinite;
}

@keyframes float{
50%{transform:translateY(-40px);}
}

@keyframes float2{
50%{transform:translate(-40px,-30px);}
}

.card{

backdrop-filter:blur(25px);
-webkit-backdrop-filter:blur(25px);

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.15);

padding:45px;

border-radius:30px;

width:420px;

text-align:center;

box-shadow:
0 25px 60px rgba(0,0,0,.35),
0 0 80px rgba(59,130,246,.15);

animation:appear .8s ease;
}

@keyframes appear{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:none;
}
}

.icon{
width:135px;
height:135px;
border-radius:30px;
box-shadow:
0 20px 40px rgba(0,0,0,.35),
0 0 30px rgba(255,255,255,.15);
margin-bottom:25px;
}

h1{
font-size:38px;
font-weight:700;
color:white;
margin-bottom:10px;
}

.subtitle{
font-size:18px;
color:rgba(255,255,255,.75);
margin-bottom:35px;
line-height:1.5;
}

.install{

display:inline-block;

padding:18px 42px;

border-radius:18px;

text-decoration:none;

font-size:21px;

font-weight:700;

color:white;

background:linear-gradient(135deg,#60a5fa,#2563eb);

box-shadow:
0 10px 35px rgba(37,99,235,.5);

transition:.3s;
}

.install:hover{

transform:translateY(-4px) scale(1.03);

box-shadow:
0 20px 45px rgba(37,99,235,.65);

}

.status{

margin-top:28px;

font-size:15px;

color:rgba(255,255,255,.65);

}

.loader{

margin:25px auto;

width:42px;

height:42px;

border:4px solid rgba(255,255,255,.2);

border-top:4px solid white;

border-radius:50%;

animation:spin .8s linear infinite;

}

@keyframes spin{
100%{
transform:rotate(360deg);
}

}

</style>
